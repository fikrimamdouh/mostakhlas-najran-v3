<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script src="/original/user-storage-proxy.js"></script>
<script src="/original/auth-check.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتاب المستخلص الكامل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;background:#e9eef5;color:#172033;font-family:Tajawal,Arial,sans-serif;direction:rtl}.toolbar{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#0f2f55,#1e5d92);color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 6px 22px rgba(15,47,85,.22)}.toolbar h1{font-size:18px;margin:0;font-weight:900}.toolbar p{margin:3px 0 0;font-size:12px;opacity:.75}.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:10px 16px;font-family:inherit;font-weight:900;cursor:pointer}.btn-print{background:#16a34a;color:#fff}.btn-back{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28)}.book{max-width:1120px;margin:22px auto 80px;padding:0 16px}.page{background:#fff;border:1px solid #dbe5ef;border-radius:20px;margin:0 0 18px;padding:24px;box-shadow:0 7px 24px rgba(15,47,85,.06);break-after:page}.cover{min-height:720px;display:flex;flex-direction:column;justify-content:center;text-align:center;border-top:10px solid #123b6d}.cover .mark{font-size:58px;margin-bottom:20px}.cover h2{font-size:34px;color:#123b6d;margin:0 0 10px;font-weight:900}.cover .subtitle{font-size:18px;color:#475569;margin-bottom:34px}.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:20px}.meta{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:13px}.meta span{display:block;font-size:11px;color:#64748b;font-weight:900;margin-bottom:5px}.meta b{font-size:15px;color:#123b6d}.section-title{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #123b6d;padding-bottom:10px;margin-bottom:16px}.section-title h3{margin:0;color:#123b6d;font-size:21px;font-weight:900}.section-title span{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;border-radius:999px;padding:5px 12px;font-size:11px;font-weight:900}.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:12px 0 18px}.summary-card{background:#f0f9ff;border:1px solid #bae6fd;border-radius:14px;padding:13px;text-align:center}.summary-card b{display:block;color:#0c4a6e;font-size:19px}.summary-card span{font-size:11px;color:#0369a1;font-weight:900}.panel{border:1px solid #e2e8f0;border-radius:16px;margin:14px 0;overflow:hidden}.panel-head{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:12px 14px;display:flex;justify-content:space-between;gap:10px;align-items:center}.panel-head h4{margin:0;color:#123b6d;font-size:15px}.panel-head small{color:#64748b;font-weight:800}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:11.5px}th{background:#123b6d;color:#fff;padding:8px;border:1px solid #123b6d;white-space:nowrap}td{padding:7px;border:1px solid #e2e8f0;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.muted{color:#94a3b8}.empty{padding:28px;border:1.5px dashed #cbd5e1;border-radius:16px;background:#f8fafc;text-align:center;color:#64748b;font-weight:800}.kv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.kv{background:#f8fafc;border:1px solid #e2e8f0;border-radius:13px;padding:11px}.kv span{display:block;font-size:11px;color:#64748b;font-weight:900}.kv b{display:block;margin-top:5px;color:#172033}.days{display:flex;gap:2px;min-width:220px}.day{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;border-radius:5px;border:1px solid #e2e8f0;font-weight:900;font-size:10px}.day-ح{background:#e8f0fe;color:#1d4ed8}.day-غ{background:#fee2e2;color:#b91c1c}.day-ج{background:#fef3c7;color:#b45309}.day-ش{background:#d1ecf1;color:#0369a1}.day-ت{background:#e2e8f0;color:#475569}.foot{font-size:11px;color:#64748b;text-align:center;margin-top:18px;border-top:1px solid #e2e8f0;padding-top:10px}.loading{max-width:720px;margin:60px auto;background:#fff;border-radius:18px;padding:28px;text-align:center;border:1px solid #dbe5ef;color:#123b6d;font-weight:900}@media print{body{background:#fff}.toolbar,#najran-auth-bar{display:none!important}.book{max-width:none;margin:0;padding:0}.page{border:0;border-radius:0;box-shadow:none;margin:0;padding:14mm;min-height:270mm}.cover{min-height:260mm}table{font-size:10px}th,td{padding:5px}.page{break-after:page}}
</style>
</head>
<body>
<div class="toolbar"><div><h1>كتاب المستخلص الكامل</h1><p>نسخة طباعة موحدة من بيانات المستخلص وقت الرفع</p></div><div class="toolbar-actions"><button class="btn btn-print" onclick="window.print()">طباعة / حفظ PDF</button><button class="btn btn-back" onclick="history.back()">رجوع</button></div></div>
<div id="app"><div class="loading">جاري تحميل المستخلص الكامل...</div></div>
<script>
(function(){
'use strict';
const DEPT={cleaning:'النظافة',electricity:'الكهرباء',agriculture:'الزراعة',civil_works:'الأعمال المدنية','civil-works':'الأعمال المدنية',mechanical:'الميكانيكا',security:'الأمن',laundry:'المغسلة',patient_services:'خدمات المرضى','patient-services':'خدمات المرضى',admin_saudi:'الإداريون السعوديون','admin-saudi':'الإداريون السعوديون'};
const STATUS={'ح':'حاضر','غ':'غائب','ج':'إجازة','ش':'شاغرة','ت':'تحت الإجراء','ب':'بداية العقد','ن':'نهاية العقد'};
const LABEL={name:'الاسم',employeeName:'اسم الموظف',jobTitle:'الوظيفة',category:'الفئة',nationality:'الجنسية',iqamaId:'رقم الإقامة',attendanceDays:'حضور',absenceDays:'غياب',deduction:'الحسم',absencePenalty:'غرامة الغياب',totalFine:'الغرامة',netSalary:'الصافي',salary:'الراتب',item:'الصنف',itemName:'الصنف',materialName:'الصنف',quantity:'الكمية',qty:'الكمية',unit:'الوحدة',price:'السعر',unitPrice:'سعر الوحدة',total:'الإجمالي',amount:'المبلغ',percentage:'النسبة',percent:'النسبة',deductionAmount:'قيمة الخصم',score:'التقييم',notes:'ملاحظات',note:'ملاحظة',title:'البيان',description:'الوصف'};
const SECTIONS=[['attendance','الحضور والانصراف'],['performance','تقييم الأداء'],['achievement','شهادة الإنجاز'],['consumables','المستهلكات والمواد'],['spare','قطع الغيار']];
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function money(n){const v=Number(n||0);return v?v.toLocaleString('ar-SA',{minimumFractionDigits:2,maximumFractionDigits:2}):'—'}
function getSession(){try{return JSON.parse(localStorage.getItem('najran_session')||'{}')}catch(_){return{}}}
function parse(raw){if(!raw)return{};if(typeof raw==='object')return raw;try{return JSON.parse(raw)}catch(_){return{}}}
function norm(k){return String(k||'').replace(/^_u\d+_/,'')}
function field(k,i){if(LABEL[k])return LABEL[k];const c=String(k||'').toLowerCase();if(c.includes('name'))return'الاسم';if(c.includes('total'))return'الإجمالي';if(c.includes('amount')||c.includes('cost'))return'المبلغ';if(c.includes('note'))return'ملاحظات';if(c.includes('percent'))return'النسبة';if(c.includes('qty')||c.includes('quantity'))return'الكمية';if(c.includes('price'))return'السعر';if(c.includes('score')||c.includes('grade'))return'التقييم';return'بيان '+(i+1)}
function objArr(a){return Array.isArray(a)&&a.length&&a.every(x=>x&&typeof x==='object'&&!Array.isArray(x))}
function cell(v){if(v==null||v==='')return'<span class="muted">—</span>';if(typeof v==='number')return esc(Number(v).toLocaleString('ar-SA',{maximumFractionDigits:2}));if(typeof v==='boolean')return v?'نعم':'لا';if(typeof v==='object')return'<span class="muted">تفاصيل</span>';return esc(v)}
function table(arr){if(!Array.isArray(arr)||!arr.length)return empty('لا توجد بيانات');const rows=arr.slice(0,300),pref=['name','employeeName','jobTitle','category','nationality','iqamaId','attendanceDays','absenceDays','deduction','absencePenalty','totalFine','netSalary','item','itemName','materialName','quantity','qty','unit','price','unitPrice','total','amount','percentage','deductionAmount','score','notes'];const set=new Set();pref.forEach(c=>rows.some(r=>r&&r[c]!==undefined)&&set.add(c));rows.forEach(r=>Object.keys(r||{}).slice(0,28).forEach(k=>{if(k!=='days')set.add(k)}));const cols=Array.from(set).slice(0,14);if(!cols.length)return empty('لا توجد أعمدة قابلة للعرض');return'<div class="table-wrap"><table><thead><tr>'+cols.map((c,i)=>'<th>'+esc(field(c,i))+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+cell(r?r[c]:'')+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>'}
function empty(t){return'<div class="empty">'+esc(t)+'</div>'}
function kv(obj){const ks=Object.keys(obj||{});if(!ks.length)return empty('لا توجد بيانات');return'<div class="kv-grid">'+ks.slice(0,80).map((k,i)=>'<div class="kv"><span>'+esc(field(k,i))+'</span><b>'+cell(obj[k])+'</b></div>').join('')+'</div>'}
function renderValue(v){if(objArr(v))return table(v);if(Array.isArray(v))return v.length?'<div class="kv-grid">'+v.slice(0,80).map((x,i)=>'<div class="kv"><span>بند '+(i+1)+'</span><b>'+cell(x)+'</b></div>').join('')+'</div>':empty('لا توجد بيانات');if(v&&typeof v==='object'){const ak=Object.keys(v).find(k=>objArr(v[k]));if(ak)return table(v[ak]);return kv(v)}return'<div class="summary-grid"><div class="summary-card"><b>'+cell(v)+'</b><span>القيمة</span></div></div>'}
function countDays(days){const c={p:0,a:0,l:0,v:0,w:0};(Array.isArray(days)?days:[]).forEach(d=>{if(d==='ح')c.p++;else if(d==='غ')c.a++;else if(d==='ج')c.l++;else if(d==='ش')c.v++;else if(d==='ت')c.w++});return c}
function days(days){if(!Array.isArray(days)||!days.length)return'<span class="muted">—</span>';return'<div class="days">'+days.map((d,i)=>'<span class="day day-'+esc(d)+'" title="يوم '+(i+1)+' — '+esc(STATUS[d]||d||'')+'">'+esc(d||'—')+'</span>').join('')+'</div>'}
function attendance(data){if(!data||typeof data!=='object')return renderValue(data);const depts=Object.keys(data).filter(k=>Array.isArray(data[k]));if(!depts.length)return renderValue(data);let emp=0,p=0,a=0,ded=0,fine=0,net=0;const parts=depts.map(dept=>{const rows=data[dept]||[];let da=0,dn=0;rows.forEach(e=>{const c=countDays(e.days);emp++;p+=Number(e.attendanceDays??c.p??0);a+=Number(e.absenceDays??c.a??0);da+=Number(e.absenceDays??c.a??0);ded+=Number(e.deduction||0);fine+=Number(e.totalFine||e.absencePenalty||0);dn+=Number(e.netSalary||0);net+=Number(e.netSalary||0)});const body=rows.map((e,i)=>{const c=countDays(e.days);return'<tr><td>'+(i+1)+'</td><td>'+esc(e.name||e.employeeName||'—')+'</td><td>'+esc(e.jobTitle||'—')+'</td><td>'+esc(e.category||'—')+'</td><td>'+esc(e.nationality||'—')+'</td><td>'+esc(e.iqamaId||'—')+'</td><td>'+(e.attendanceDays??c.p)+'</td><td>'+(e.absenceDays??c.a)+'</td><td>'+c.l+'</td><td>'+c.v+'</td><td>'+c.w+'</td><td>'+money(e.deduction)+'</td><td>'+money(e.totalFine||e.absencePenalty)+'</td><td>'+money(e.netSalary)+'</td><td>'+days(e.days)+'</td></tr>'}).join('');return'<div class="panel"><div class="panel-head"><h4>'+esc(DEPT[dept]||'قسم غير محدد')+'</h4><small>'+rows.length+' موظف · غياب '+da+' · الصافي '+money(dn)+'</small></div><div class="table-wrap"><table><thead><tr><th>#</th><th>الموظف</th><th>الوظيفة</th><th>الفئة</th><th>الجنسية</th><th>الإقامة</th><th>حضور</th><th>غياب</th><th>إجازة</th><th>شاغرة</th><th>تحت الإجراء</th><th>الحسم</th><th>الغرامة</th><th>الصافي</th><th>الأيام</th></tr></thead><tbody>'+body+'</tbody></table></div></div>'}).join('');return'<div class="summary-grid"><div class="summary-card"><b>'+emp+'</b><span>إجمالي الموظفين</span></div><div class="summary-card"><b>'+p+'</b><span>أيام الحضور</span></div><div class="summary-card"><b>'+a+'</b><span>أيام الغياب</span></div><div class="summary-card"><b>'+money(ded)+'</b><span>إجمالي الحسم</span></div><div class="summary-card"><b>'+money(fine)+'</b><span>إجمالي الغرامات</span></div><div class="summary-card"><b>'+money(net)+'</b><span>الصافي</span></div></div>'+parts}
function entries(snap,type){const map={attendance:{keys:['attendanceData','ng_attendanceData','nd_attendanceData','centersAttendanceData_v2','healthCentersAttendanceData','adminOfficesAttendanceData_v1'],p:['deptCalculatedCost_']},performance:{keys:['performanceData','performanceTotalDeduction','ng_performanceTotalDeduction','nd_performanceTotalDeduction','performance_data_consumables_v27'],p:['dept_','performance_']},achievement:{keys:['achievementData','achievementTitles_v1','achievementItemNames','nd_dentalAchievementTotals'],p:['achievement_','nd_dentalAchievement']},consumables:{keys:['consumablesTableData','healthCentersConsumables','mainHospitalConsumables','admin_offices_consumables_v1.0','finalConsumablesCost','water_supply_data_consumables_v27','sewage_disposal_data_consumables_v27','subcontractors_data_consumables_v27'],p:['consumables_','water_','sewage_','subcontractors_']},spare:{keys:['spare_partsData','sparePartsTotalAmount'],p:['spare_']}}[type];const ex=new Set(map.keys),out=[];Object.keys(snap||{}).forEach(raw=>{const k=norm(raw);if(ex.has(k)||map.p.some(p=>k.startsWith(p)))out.push([k,snap[raw]])});return out}
function label(k){if(k.startsWith('deptCalculatedCost_'))return'تكلفة قسم '+(DEPT[k.replace('deptCalculatedCost_','')]||'غير محدد');if(k.startsWith('dept_'))return'تقييم قسم '+(DEPT[k.replace('dept_','')]||'غير محدد');const x={attendanceData:'جدول الحضور والانصراف',performanceData:'جداول تقييم الأداء',performanceTotalDeduction:'إجمالي خصومات الأداء',achievementData:'شهادة الإنجاز',consumablesTableData:'جدول المستهلكات',finalConsumablesCost:'إجمالي المستهلكات',spare_partsData:'جدول قطع الغيار',sparePartsTotalAmount:'إجمالي قطع الغيار'};return x[k]||'بيانات مساندة'}
function section(snap,type,title){const en=entries(snap,type);return'<section class="page"><div class="section-title"><h3>'+esc(title)+'</h3><span>'+(en.length?'مرفق':'غير مرفق')+'</span></div>'+(en.length?en.map(([k,v])=>'<div class="panel"><div class="panel-head"><h4>'+esc(label(k))+'</h4></div>'+(type==='attendance'&&/attendanceData/i.test(k)?attendance(v):renderValue(v))+'</div>').join(''):empty('لا توجد بيانات محفوظة لهذا الجزء داخل نسخة الرفع'))+'<div class="foot">كتاب المستخلص الكامل — بيانات ثابتة من نسخة الرفع</div></section>'}
async function load(){const id=new URLSearchParams(location.search).get('id');if(!id){document.getElementById('app').innerHTML='<div class="loading">رقم المستخلص غير موجود</div>';return}const s=getSession();const res=await fetch('/api/submitted-extracts',{headers:{Authorization:'Bearer '+(s.clerkToken||'')}});if(!res.ok)throw new Error();const data=await res.json();const e=(data.extracts||[]).find(x=>String(x.id)===String(id));if(!e){document.getElementById('app').innerHTML='<div class="loading">لم يتم العثور على المستخلص</div>';return}const snap=parse(e.extractData);document.title='كتاب المستخلص الكامل - '+(e.periodMonth||'');document.getElementById('app').innerHTML='<main class="book"><section class="page cover"><div class="mark">📘</div><h2>كتاب المستخلص الكامل</h2><div class="subtitle">نسخة موحدة للطباعة والحفظ PDF</div><div class="meta-grid"><div class="meta"><span>المستشفى</span><b>'+esc(e.hospitalName||e.submittedByHospital||'—')+'</b></div><div class="meta"><span>الشركة</span><b>'+esc(e.companyName||'—')+'</b></div><div class="meta"><span>رقم العقد</span><b>'+esc(e.contractNumber||'—')+'</b></div><div class="meta"><span>الفترة</span><b>'+esc(e.periodMonth||'—')+'</b></div><div class="meta"><span>القيمة</span><b>'+money(e.totalAmount)+'</b></div><div class="meta"><span>الحالة</span><b>'+esc(e.status||'—')+'</b></div></div></section>'+SECTIONS.map(([type,title])=>section(snap,type,title)).join('')+'</main>'}
load().catch(()=>{document.getElementById('app').innerHTML='<div class="loading">تعذر تحميل كتاب المستخلص الكامل</div>'});
})();
</script>
</body>
</html>
