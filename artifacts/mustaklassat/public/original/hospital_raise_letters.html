<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <script src="/original/user-storage-proxy.js"></script>
  <script src="/original/auth-check.js"></script>
  <script src="/original/cloud-sync.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خطابات رفع المستشفى</title>
  <link rel="stylesheet" href="/original/shared-styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#003087;--accent:#0ea5e9;--bg:#eef4fb;--card:#fff;--muted:#64748b;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#eef4fb,#f8fbff);font-family:Tajawal,Arial,sans-serif;color:#0f172a;direction:rtl;}
    .standalone-header{max-width:1200px;margin:22px auto 0;padding:18px 22px;background:var(--card);border:1px solid #dbe4f0;border-radius:18px;box-shadow:0 12px 30px rgba(15,23,42,.08);display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .standalone-header h1{margin:0;color:var(--primary);font-size:24px;font-weight:900;}
    .standalone-header p{margin:6px 0 0;color:var(--muted);font-weight:700;}
    .back-link{display:inline-flex;align-items:center;gap:8px;text-decoration:none;background:#334155;color:#fff;border-radius:12px;padding:10px 14px;font-weight:900;}
    #letters-host{max-width:1200px;margin:0 auto;padding-bottom:40px;}
    .loading{max-width:720px;margin:40px auto;background:#fff;border:1px solid #dbe4f0;border-radius:18px;box-shadow:0 12px 30px rgba(15,23,42,.08);padding:28px;text-align:center;font-weight:900;color:#003087;}
    body #rl-root{max-width:1200px!important;margin:22px auto!important;position:relative!important;z-index:5!important;}
  </style>
  <script>
    (function(){
      var qs = new URLSearchParams(location.search || '');
      if (qs.get('hospitalLettersClean') !== '1' || !qs.get('page')) {
        location.replace('/original/hospital_raise_letters.html?hospitalLettersClean=1&page=achievement.html#hospital-letters-clean');
      }
    })();
  </script>
</head>
<body>
  <header class="standalone-header">
    <div>
      <h1>خطابات رفع المستشفى</h1>
      <p>صفحة مستقلة للخطابات. تقرأ بيانات العقد والمستخلص من النظام بدون المرور على شهادة الإنجاز.</p>
    </div>
    <a class="back-link" href="/original/index.html">الصفحة الرئيسية</a>
  </header>
  <div id="letters-host">
    <div class="loading">جاري تحميل مركز خطابات المستشفى...</div>
  </div>
  <script src="/original/hospital_raise_letters_final_v3.js?v=20260628_standalone_v1"></script>
  <script>
    window.addEventListener('load', function(){
      setTimeout(function(){
        var root = document.getElementById('rl-root');
        var loading = document.querySelector('.loading');
        if (root && loading) loading.remove();
        if (!root && loading) loading.textContent = 'تعذر تحميل مركز الخطابات. اعمل تحديث للصفحة.';
      }, 800);
    });
  </script>
</body>
</html>
