    body{margin:0;background:#eef3f9;font-family:Tajawal,Arial,sans-serif;color:#0f172a}.box{max-width:1120px;margin:14px auto;background:#fff;border-radius:22px;padding:18px;box-shadow:0 18px 55px rgba(15,23,42,.16)}h1{margin:0 0 8px;color:#003087;font-size:24px;font-weight:900}p{margin:0 0 12px;color:#475569;font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;justify-content:center}button{border:0;border-radius:10px;padding:10px 14px;font-family:inherit;font-weight:900;cursor:pointer;background:#f1f5f9}.ok{background:#047857;color:#fff}.danger{background:#991b1b;color:#fff}.doc{border:1px solid #cbd5e1;background:#fff}.doc.active{background:#003087;color:#fff}.section{border:1px solid #e2e8f0;background:#f8fafc;border-radius:16px;padding:14px;margin:12px 0}.section h2{margin:0 0 12px;color:#003087;font-size:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}.field{display:block;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:10px}.field.wide{grid-column:1/-1}.field span{display:block;font-size:12px;font-weight:900;color:#334155;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px;font-family:inherit;font-weight:800;box-sizing:border-box}.field textarea{min-height:96px;line-height:1.8}.preview{max-width:180px;max-height:250px;border:1px solid #cbd5e1;border-radius:10px;display:block;margin:8px auto}#msg{min-height:28px;color:#047857;font-weight:900;text-align:center}@media(max-width:700px){.box{margin:8px;padding:12px}.grid{grid-template-columns:1fr}button{flex:1 1 140px}}
