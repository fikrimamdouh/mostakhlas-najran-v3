kind = "web"
previewPath = "/"
title = "نظام المستخلصات"
version = "1.0.0"
id = "artifacts/mustaklassat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18746

[services.development]
run = "pnpm --filter @workspace/mustaklassat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mustaklassat", "run", "build" ]
publicDir = "artifacts/mustaklassat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18746"
BASE_PATH = "/"
